<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Scholar Agent — 学术论文作者信息与邮箱智能挖掘系统，支持 DOI 批量解析">
    <title>Scholar Agent — 学术智能挖掘</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <!-- 背景氛围光效 -->
    <div class="ambient-bg">
        <div class="ambient-blob blob-1"></div>
        <div class="ambient-blob blob-2"></div>
        <div class="ambient-blob blob-3"></div>
    </div>

    <div class="app-container">
        <!-- 顶部导航 -->
        <header class="app-header">
            <div class="logo">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"/>
                    <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
                    <line x1="2" y1="12" x2="22" y2="12"/>
                </svg>
                <span>Scholar Agent</span>
            </div>
            <div class="header-badge">学术智能挖掘</div>
        </header>

        <!-- 主内容区 -->
        <main class="main-content">
            <!-- 搜索面板 -->
            <section class="search-panel" id="searchPanel">
                <h1 class="panel-title">输入 DOI 提取作者信息</h1>
                <p class="panel-desc">粘贴 DOI、文本内容（系统将自动识别其中的 DOI），或上传 PDF / XML 文件</p>

                <form id="searchForm" class="search-form">
                    <div class="input-group">
                        <textarea 
                            id="doiInput" 
                            class="glass-input" 
                            placeholder="粘贴 DOI 号、包含 DOI 的文本、或多个 DOI（每行一个）&#10;&#10;示例：10.1038/s41586-024-07510-0"
                            rows="4"
                        ></textarea>
                    </div>
                    
                    <div class="file-upload-area" id="fileUploadArea">
                        <input type="file" id="fileInput" accept=".pdf,.xml,.html,.txt,.csv,.bib" hidden>
                        <div class="upload-content" id="uploadContent">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                                <polyline points="17 8 12 3 7 8"/>
                                <line x1="12" y1="3" x2="12" y2="15"/>
                            </svg>
                            <span>拖放文件到此处，或 <em>点击上传</em></span>
                            <small>支持 PDF, XML, HTML, TXT, CSV, BIB</small>
                        </div>
                        <div class="upload-file-name" id="uploadFileName" style="display:none"></div>
                    </div>

                    <button type="submit" class="submit-btn" id="submitBtn">
                        <span class="btn-text">开始提取</span>
                        <span class="btn-loader" style="display:none">
                            <span class="spinner"></span> 处理中...
                        </span>
                    </button>
                </form>
            </section>

            <!-- 进度面板 -->
            <section class="progress-panel" id="progressPanel" style="display:none">
                <div class="progress-header">
                    <h2>处理进度</h2>
                    <span class="progress-count" id="progressCount">0/0</span>
                </div>
                <div class="progress-bar-track">
                    <div class="progress-bar-fill" id="progressBarFill" style="width:0%"></div>
                </div>
                <div class="progress-log" id="progressLog"></div>
            </section>

            <!-- 结果面板 -->
            <section class="results-panel" id="resultsPanel" style="display:none">
                <div class="results-header">
                    <h2>挖掘结果</h2>
                    <div class="export-buttons" id="exportButtons" style="display:none">
                        <a class="export-btn" id="downloadCsv" href="#" download>
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                            CSV
                        </a>
                        <a class="export-btn" id="downloadXlsx" href="#" download>
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                            Excel
                        </a>
                    </div>
                </div>
                <div class="results-grid" id="resultsGrid"></div>
            </section>

            <!-- 错误面板 -->
            <section class="error-panel" id="errorPanel" style="display:none">
                <div class="error-content">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
                    <p id="errorMessage"></p>
                    <button class="retry-btn" onclick="resetUI()">重新开始</button>
                </div>
            </section>
        </main>

        <!-- 底部 -->
        <footer class="app-footer">
            <span>Scholar Agent V2 · Powered by Semantic Scholar & 智谱 GLM-4</span>
        </footer>
    </div>

    <script src="/static/main.js"></script>
</body>
</html>
