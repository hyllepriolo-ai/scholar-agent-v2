<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="伯乐 — 学术联系人智能发现系统，支持 DOI 批量解析，自动提取论文作者邮箱">
    <title>伯乐 — 学术联系人智能发现</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="app-container">
        <!-- 顶部导航 -->
        <header class="app-header">
            <div class="logo">
                <div class="logo-icon">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
                        <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
                    </svg>
                </div>
                <div class="logo-text">
                    <span class="logo-name">伯乐</span>
                    <span class="logo-subtitle">学术联系人智能发现</span>
                </div>
            </div>
        </header>

        <!-- 主内容区 -->
        <main class="main-content">
            <!-- 搜索面板 -->
            <section class="search-panel" id="searchPanel">
                <h1 class="panel-title">输入 DOI 提取作者信息</h1>
                <p class="panel-desc">粘贴 DOI、包含 DOI 的文本，或上传文献文件，系统将自动识别并提取第一作者与通讯作者的联系方式。</p>

                <form id="searchForm" class="search-form">
                    <div class="input-group">
                        <textarea 
                            id="doiInput" 
                            class="glass-input" 
                            placeholder="粘贴 DOI 号、包含 DOI 的文本、或多个 DOI（每行一个）&#10;&#10;示例：10.1038/s41586-024-07510-0"
                            rows="4"
                        ></textarea>
                    </div>
                    
                    <div class="file-upload-area" id="fileUploadArea">
                        <input type="file" id="fileInput" accept=".pdf,.xml,.html,.txt,.csv,.bib" hidden>
                        <div class="upload-content" id="uploadContent">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                                <polyline points="17 8 12 3 7 8"/>
                                <line x1="12" y1="3" x2="12" y2="15"/>
                            </svg>
                            <span>拖放文件到此处，或 <em>点击上传</em></span>
                            <small>支持 PDF, XML, HTML, TXT, CSV, BIB</small>
                        </div>
                        <div class="upload-file-name" id="uploadFileName" style="display:none"></div>
                    </div>

                    <button type="submit" class="submit-btn" id="submitBtn">
                        <span class="btn-text">开始提取</span>
                        <span class="btn-loader" style="display:none">
                            <span class="spinner"></span> 处理中...
                        </span>
                    </button>
                </form>
            </section>

            <!-- 进度面板 -->
            <section class="progress-panel" id="progressPanel" style="display:none">
                <div class="progress-header">
                    <h2>处理进度</h2>
                    <span class="progress-count" id="progressCount">0/0</span>
                </div>
                <div class="progress-bar-track">
                    <div class="progress-bar-fill" id="progressBarFill" style="width:0%"></div>
                </div>
                <div class="progress-log" id="progressLog"></div>
            </section>

            <!-- 实时结果卡片面板 -->
            <section class="results-panel" id="resultsPanel" style="display:none">
                <div class="results-header">
                    <h2>实时结果</h2>
                </div>
                <div class="results-grid" id="resultsGrid"></div>
            </section>

            <!-- 汇总表格面板（全部完成后显示） -->
            <section class="summary-panel" id="summaryPanel" style="display:none">
                <div class="summary-header">
                    <div>
                        <h2>汇总结果</h2>
                        <div class="summary-stats" id="summaryStats"></div>
                    </div>
                    <div class="export-buttons" id="exportButtons">
                        <a class="export-btn" id="downloadCsv" href="#" download>
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                            下载 CSV
                        </a>
                        <a class="export-btn" id="downloadXlsx" href="#" download>
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                            下载 Excel
                        </a>
                    </div>
                </div>
                <div id="summaryTableContainer"></div>
            </section>

            <!-- 错误面板 -->
            <section class="error-panel" id="errorPanel" style="display:none">
                <div class="error-content">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
                    <p id="errorMessage"></p>
                    <button class="retry-btn" onclick="resetUI()">重新开始</button>
                </div>
            </section>
        </main>

        <!-- 底部 -->
        <footer class="app-footer">
            <span>伯乐 V3 · Powered by Semantic Scholar & Qwen</span>
        </footer>
    </div>

    <script src="/static/main.js"></script>
</body>
</html>
